<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>
<header>
<h2>Citizen Grievance User Dashboard</h2>

<a href="index.html">
<button class="home-btn">🏠 Home</button>
</a>
</header><style>

body{
font-family:Arial, sans-serif;
margin:0;
background:url("https://www.citizenservices.in/wp-content/uploads/2025/05/cropped-citizenservices.jpg")
no-repeat center center/cover;
height:100vh;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

header{
background:#2980b9;
color:#ffffff;
padding:18px;
text-align:center;
font-size:22px;
}

.container{
width:520px;
margin:auto;
margin-top:60px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

h3{
color:#2c3e50;
margin-bottom:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#27ae60;
color:white;
padding:12px;
border:none;
cursor:pointer;
border-radius:5px;
font-size:15px;
width:100%;
}

button:hover{
background:#2ecc71;
}

.success{
display:none;
margin-top:20px;
padding:20px;
background:#d4edda;
color:#155724;
border-radius:6px;
text-align:center;
font-size:16px;
}

</style>
</head>

<body>

<header>
<h2></h2>
</header>

<div class="container">

<div id="complaintForm">

<h3>Submit Complaint</h3>

<input id="name" placeholder="Enter Your Name">

<textarea id="description" placeholder="Describe the issue"></textarea>

<select id="category">
<option value="">Select Category</option>
<option>Road</option>
<option>Water</option>
<option>Electricity</option>
<option>Waste</option>
<option>Public Safety</option>
</select>

<label style="color:#34495e;font-weight:bold;">Select District</label>

<select id="district">
<option value="">Select District</option>

<option>Nellore</option>
<option>Tirupati</option>
<option>Chittoor</option>
<option>Kadapa</option>
<option>Kurnool</option>
<option>Guntur</option>
<option>Krishna</option>
<option>Visakhapatnam</option>

<option>Hyderabad</option>
<option>Warangal</option>
<option>Karimnagar</option>
<option>Nizamabad</option>
<option>Khammam</option>
<option>Adilabad</option>

<option>Chennai</option>
<option>Madurai</option>
<option>Coimbatore</option>
<option>Salem</option>
<option>Tiruchirappalli</option>
<option>Erode</option>

</select>

<label style="color:#34495e;font-weight:bold;">Upload Image</label>
<input type="file" id="image">

<button onclick="submitComplaint()">Submit Complaint</button>

</div>

<div id="successMessage" class="success"></div>

</div>

<script>

function submitComplaint(){

let name=document.getElementById("name").value;
let description=document.getElementById("description").value;
let category=document.getElementById("category").value;
let district=document.getElementById("district").value;

if(name.trim()=="" || district==""){
alert("Please fill all required fields");
return;
}

let complaints=JSON.parse(localStorage.getItem("complaints")) || [];

let complaint={
id:"CMP"+Math.floor(Math.random()*10000),
name:name,
description:description,
category:category,
location:district,
status:"Submitted"
};

complaints.push(complaint);

localStorage.setItem("complaints",JSON.stringify(complaints));

document.getElementById("complaintForm").style.display="none";

document.getElementById("successMessage").style.display="block";

document.getElementById("successMessage").innerHTML=
"✅ Complaint Submitted Successfully.<br>Your Complaint ID: <b>"+complaint.id+"</b>";

}

</script>

</body>
</html>
