<!DOCTYPE html>
<html>
<head>
<title>View Complaint Status</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(120deg,#3498db,#8e44ad);
}

/* HOME BUTTON */

.home-btn{
position:fixed;
top:20px;
left:20px;
background:#3498db;
color:white;
padding:10px 18px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.3s;
}

.home-btn:hover{
background:#2980b9;
}

/* CONTAINER */

.container{
background:white;
padding:30px;
width:400px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#3498db;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.result{
margin-top:20px;
font-size:16px;
}

/* Loader */

.loader{
display:none;
margin:15px auto;
border:6px solid #f3f3f3;
border-top:6px solid #3498db;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- HOME BUTTON -->

<a href="index.html" class="home-btn">🏠 Home</a>

<div class="container">

<h2>View Complaint Status</h2>

<input type="text" id="cid" placeholder="Enter Complaint ID">

<br>

<button onclick="viewStatus()">View Status</button>

<div id="loader" class="loader"></div>

<div id="result" class="result"></div>

</div>

<script>

function viewStatus(){

let id=document.getElementById("cid").value.trim();

let complaints=JSON.parse(localStorage.getItem("complaints")) || [];

let result=document.getElementById("result");
let loader=document.getElementById("loader");

result.innerHTML="";
loader.style.display="block";

setTimeout(function(){

loader.style.display="none";

let found=complaints.find(c => c.id === id);

if(found){

result.innerHTML=
"<b>Name:</b> "+found.name+"<br>"+
"<b>Category:</b> "+found.category+"<br>"+
"<b>Location:</b> "+found.location+"<br>"+
"<b>Status:</b> "+found.status;

}

else{

result.innerHTML="❌ Complaint not found";

}

},1000);

}

</script>

</body>
</html>
