<!DOCTYPE html>
<html>
<head>
<title>Search Complaint</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

/* Light gradient background */

background:linear-gradient(270deg,#a1c4fd,#c2e9fb,#d4fc79,#96e6a1);
background-size:800% 800%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Home Button */

.home-btn{
position:fixed;
top:20px;
left:20px;
background:#3498db;
color:white;
padding:10px 18px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
transition:0.3s;
z-index:1000;
}

.home-btn:hover{
background:#2980b9;
transform:scale(1.05);
}

/* Floating background circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.3);
animation:float 10s infinite linear;
}

.circle1{
width:120px;
height:120px;
top:10%;
left:15%;
}

.circle2{
width:80px;
height:80px;
top:70%;
left:20%;
animation-duration:14s;
}

.circle3{
width:150px;
height:150px;
top:50%;
left:80%;
animation-duration:18s;
}

.circle4{
width:60px;
height:60px;
top:20%;
left:70%;
animation-duration:12s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-30px);}
100%{transform:translateY(0px);}
}

/* Main container */

.container{
background:white;
padding:30px;
width:400px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
position:relative;
z-index:2;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#3498db;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.result{
margin-top:20px;
font-size:16px;
color:#2c3e50;
}

/* Loader */

.loader{
display:none;
margin:15px auto;
border:6px solid #f3f3f3;
border-top:6px solid #3498db;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- HOME BUTTON -->

<a href="index.html" class="home-btn">🏠 Home</a>

<!-- Animated Background -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>
<div class="circle circle4"></div>

<div class="container">

<h2>Search Complaint</h2>

<input type="text" id="cid" placeholder="Enter Complaint ID">

<br>

<button onclick="searchComplaint()">Search</button>

<div id="loader" class="loader"></div>

<div id="result" class="result"></div>

</div>

<script>

function searchComplaint(){

let id=document.getElementById("cid").value.trim();

let complaints=JSON.parse(localStorage.getItem("complaints")) || [];

let result=document.getElementById("result");
let loader=document.getElementById("loader");

result.innerHTML="";
loader.style.display="block";

setTimeout(function(){

loader.style.display="none";

let found=complaints.find(c => c.id === id);

if(found){

result.innerHTML =
"<b>Name:</b> "+found.name+"<br>"+
"<b>Category:</b> "+found.category+"<br>"+
"<b>Location:</b> "+found.location+"<br>"+
"<b>Status:</b> "+found.status;

}
else{
result.innerHTML="❌ Complaint not found";
}

},1000);

}

</script>

</body>
</html>
